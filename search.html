<!DOCTYPE html>
<html>
<head>
    <title>Search Box</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:250px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Search Box</h2>

<form action="https://formsubmit.co/shannihitha@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<input
type="text"
name="Search"
placeholder="Enter something..."
required>

<br><br>

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
